name: CI — Tests unitaires

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configurer Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Installer les dépendances système (tkinter + matplotlib)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3-tk

      - name: Installer les dépendances Python
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lancer les tests avec pytest
        run: |
          pytest tests/ -v --tb=short

      - name: Vérification syntaxique des modules
        run: |
          python -m py_compile engine.py utils.py config.py main.py
